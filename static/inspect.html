<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspect File — DJ FLAC Tagger</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-inspect">
  <div class="app">
    <header>
      <h1>DJ FLAC Tagger</h1>
      <p class="subtitle">Extract &middot; Tag &middot; Embed Artwork</p>
      <nav class="tab-nav">
        <a href="/" class="tab-link">Extract</a>
        <a href="/fix" class="tab-link">Fix Metadata</a>
        <a href="/inspect" class="tab-link active">Inspect</a>
        <a href="/normalise" class="tab-link">Normalise</a>
        <a href="/settings" class="tab-link">Settings</a>
      </nav>
    </header>

    <main>
      <!-- Browse -->
      <section class="card">
        <h2>Select Audio File</h2>
        <div class="dir-bar">
          <input type="text" id="ins-dir" placeholder="~/Music/FLACs" />
          <button id="ins-browse-btn" class="btn btn-secondary">Browse</button>
        </div>
        <div id="ins-file-list" class="file-list"></div>
      </section>

      <div id="ins-details-layout" class="inspect-details-layout hidden">
        <div class="inspect-row-meta-art">
          <section class="card inspect-meta-panel" id="ins-meta-section">
            <h2>Metadata</h2>
            <div id="ins-meta-table" class="inspect-meta-table"></div>
          </section>
          <aside class="card inspect-art-aside" id="ins-art-section">
            <h2>Artwork</h2>
            <div id="ins-art-preview" class="inspect-art-preview"></div>
            <div id="ins-art-info" class="inspect-art-info"></div>
          </aside>
        </div>
        <section class="card" id="ins-info-section">
          <h2>File Details</h2>
          <div id="ins-file-info" class="inspect-file-info"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="/static/inspect.js"></script>
</body>
</html>
