<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Metadata — DJ MetaManager</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>DJ MetaManager</h1>
      <p class="subtitle">Multi-format audio &middot; Tag &middot; Artwork</p>
      <nav class="tab-nav">
        <a href="/" class="tab-link">Extract</a>
        <a href="/fix" class="tab-link active">Fix Metadata</a>
        <a href="/inspect" class="tab-link">Inspect</a>
        <a href="/normalise" class="tab-link">Normalise</a>
        <a href="/settings" class="tab-link">Settings</a>
      </nav>
    </header>

    <main>
      <!-- Select audio file -->
      <section class="card">
        <h2><span class="step">1</span> Select Audio File</h2>
        <div class="dir-bar">
          <input type="text" id="fix-dir" placeholder="~/Music/DJ-library" />
          <button id="fix-browse-btn" class="btn btn-secondary">Browse</button>
        </div>
        <div id="fix-file-list" class="file-list"></div>
        <div id="fix-current-tags" class="probe-info hidden"></div>
      </section>

      <!-- Search results -->
      <section class="card hidden" id="fix-search-section">
        <h2><span class="step">2</span> Search Results</h2>
        <div id="fix-search-status" class="status hidden"></div>
        <div id="fix-search-results" class="search-results"></div>
        <p class="hint" style="margin-top:0.75rem">Not what you're looking for? Paste a URL below instead.</p>
      </section>

      <!-- Manual fetch -->
      <section class="card" id="fix-manual-section">
        <h2><span class="step-alt">&#128279;</span> Fetch from URL</h2>
        <div class="field-row">
          <label for="fix-url">Bandcamp / Discogs / Apple Music / Spotify / URL</label>
          <input type="url" id="fix-url" placeholder="Paste a Discogs, Bandcamp, Apple Music, or Spotify link..." />
        </div>
        <button id="fix-fetch-btn" class="btn btn-primary">Fetch Metadata</button>
        <div id="fix-fetch-status" class="status hidden"></div>
      </section>

      <!-- Track selector -->
      <section class="card hidden" id="fix-tracklist-section">
        <h2><span class="step-alt">&#9835;</span> Select Track</h2>
        <div id="fix-tracklist" class="tracklist"></div>
      </section>

      <!-- Metadata editor -->
      <section class="card">
        <h2><span class="step">3</span> Metadata &amp; Artwork <button id="fix-clear-btn" class="btn btn-secondary btn-sm btn-clear">Clear All</button></h2>
        <div class="metadata-layout">
          <div class="artwork-panel">
            <div id="fix-artwork-preview" class="artwork-placeholder">
              <span>No artwork</span>
            </div>
          </div>
          <div class="fields-panel">
            <div class="field-row">
              <label for="fix-title">Title</label>
              <input type="text" id="fix-title" />
            </div>
            <div class="field-row">
              <label for="fix-artist">Artist</label>
              <input type="text" id="fix-artist" />
            </div>
            <div class="field-row">
              <label for="fix-albumartist">Album Artist</label>
              <input type="text" id="fix-albumartist" />
            </div>
            <div class="field-row">
              <label for="fix-album">Album</label>
              <input type="text" id="fix-album" />
            </div>
            <div class="field-row inline-fields">
              <div class="field-row">
                <label for="fix-date">Year</label>
                <input type="text" id="fix-date" placeholder="2024" />
              </div>
              <div class="field-row">
                <label for="fix-genre">Genre</label>
                <input type="text" id="fix-genre" placeholder="Electronic / Dance" />
              </div>
            </div>
            <div class="field-row inline-fields">
              <div class="field-row">
                <label for="fix-label">Label</label>
                <input type="text" id="fix-label" />
              </div>
              <div class="field-row">
                <label for="fix-catno">Cat No.</label>
                <input type="text" id="fix-catno" />
              </div>
            </div>
            <div class="field-row">
              <label for="fix-comment">Comment</label>
              <textarea id="fix-comment" rows="2"></textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- Save -->
      <section class="card">
        <h2><span class="step">4</span> Save</h2>
        <button id="fix-save-btn" class="btn btn-accent" disabled>Save Tags &amp; Artwork</button>
        <div id="fix-result" class="result hidden"></div>
      </section>
    </main>
  </div>

  <script src="/static/fix.js"></script>
</body>
</html>
